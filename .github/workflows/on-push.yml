name: on-push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ALL:
        type: boolean
        required: true
        description: 'Bump all modules?'

permissions:
  contents: write
  pull-requests: read
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:

  release-modules:
    uses: rx-refill-reminders/pipeline/.github/workflows/deploy-terraform-modules.yml@deploy-terraform-modules/v0
    with:
      COMPONENT: modules
    secrets: inherit
